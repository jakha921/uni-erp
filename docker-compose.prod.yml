services:
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: uni_erp
      POSTGRES_USER: uni_erp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uni_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.prod
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      DATABASE_URL: postgres://uni_erp:${POSTGRES_PASSWORD:-changeme}@postgres:5432/uni_erp
      ALLOWED_HOSTS: erp.niuedu.uz,localhost
      CORS_ALLOWED_ORIGINS: https://erp.niuedu.uz
      SECURE_SSL_REDIRECT: "false"
    command: >
      sh -c "uv run python manage.py migrate --noinput &&
             uv run python manage.py collectstatic --noinput &&
             uv run gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 4"

  frontend:
    build: ./frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  postgres_data:
