<body class="bg-surface-page font-text-base text-text-base text-on-surface antialiased h-screen w-screen overflow-hidden flex flex-col md:flex-row">
<!-- Left Side: Branding (Hidden on mobile) -->
<div class="hidden md:flex md:w-1/2 gradient-bg flex-col justify-center items-center p-12 text-center text-on-primary">
<div class="mb-8">
<span class="material-symbols-outlined text-[80px]" style='font-variation-settings: "FILL" 1;'>
                school
            </span>
</div>
<h1 class="font-text-4xl text-text-4xl mb-4 tracking-tight" style="">Uni ERP</h1>
<p class="font-text-xl text-text-xl text-primary-100 max-w-md opacity-90" style="">Navoi Innovatsiyalar Universiteti</p>
</div>
<!-- Right Side: Login Form -->
<div class="w-full md:w-1/2 flex flex-col justify-between h-full bg-surface-card p-8 md:p-16 lg:p-24 overflow-y-auto">
<!-- Mobile Logo Header (Visible only on mobile) -->
<div class="md:hidden flex items-center justify-center mb-8 gap-3">
<span class="material-symbols-outlined text-primary-500 text-[32px]" style='font-variation-settings: "FILL" 1;'>
                school
            </span>
<span class="font-text-2xl text-text-2xl text-primary-700 tracking-tight" style="">Uni ERP</span>
</div>
<div class="w-full max-w-md mx-auto my-auto">
<!-- Form Header -->
<div class="mb-8 text-center md:text-left">
<h2 class="font-text-3xl text-text-3xl text-neutral-900 mb-2" style="">Tizimga kirish</h2>
<p class="font-text-base text-text-base text-neutral-500" style="">Telefon raqamingiz va parolingizni kiriting</p>
</div>
<!-- Login Form -->
<form class="space-y-form-gap">
<!-- Phone Input -->
<div>
<label class="block font-text-sm text-text-sm text-neutral-700 mb-1.5 font-medium" for="phone" style="">Telefon raqami</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3">
<span class="material-symbols-outlined text-neutral-400 text-[20px]" style="">
                                phone_iphone
                            </span>
</span>
<input class="block w-full pl-10 pr-3 py-2.5 bg-surface-card border border-neutral-200 rounded-lg text-neutral-900 font-text-base text-text-base placeholder-neutral-400 focus:outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500 transition-colors" id="phone" name="phone" placeholder="+998 (__) ___-__-__" required="" type="text"/>
</div>
</div>
<!-- Password Input -->
<div>
<label class="block font-text-sm text-text-sm text-neutral-700 mb-1.5 font-medium" for="password" style="">Parol</label>
<div class="relative">
<span class="absolute inset-y-0 left-0 flex items-center pl-3">
<span class="material-symbols-outlined text-neutral-400 text-[20px]" style="">
                                lock
                            </span>
</span>
<input class="block w-full pl-10 pr-10 py-2.5 bg-surface-card border border-neutral-200 rounded-lg text-neutral-900 font-text-base text-text-base placeholder-neutral-400 focus:outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500 transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute inset-y-0 right-0 flex items-center pr-3 text-neutral-400 hover:text-neutral-600 focus:outline-none" style="" type="button">
<span class="material-symbols-outlined text-[20px]" style="">
                                visibility_off
                            </span>
</button>
</div>
</div>
<!-- Options -->
<div class="flex items-center justify-between pt-2">
<label class="flex items-center gap-2 cursor-pointer group" style="">
<input class="w-4 h-4 rounded border-neutral-300 text-primary-500 focus:ring-primary-500 focus:ring-offset-0 bg-surface-card" type="checkbox"/>
<span class="font-text-sm text-text-sm text-neutral-600 group-hover:text-neutral-800 transition-colors" style="">Eslab qolish</span>
</label>
<a class="font-text-sm text-text-sm text-primary-600 hover:text-primary-700 font-medium transition-colors" href="#" style="">Parolni unutdingiz?</a>
</div>
<!-- Submit Button -->
<div class="pt-4">
<button class="w-full flex justify-center py-2.5 px-4 border border-transparent rounded-lg shadow-sm font-text-lg text-text-lg text-white bg-primary-500 hover:bg-primary-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-500 active:scale-[0.98] transition-all duration-200" style="" type="submit">
                        Kirish
                    </button>
</div>
<!-- Branch Selector -->
<div class="pt-6 border-t border-neutral-100 mt-6">
<label class="block font-text-sm text-text-sm text-neutral-600 mb-1.5" for="branch" style="">Filial tanlang</label>
<div class="relative">
<select class="block w-full pl-3 pr-10 py-2.5 text-neutral-700 bg-neutral-50 border border-neutral-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary-500/30 focus:border-primary-500 sm:text-sm appearance-none font-text-sm text-text-sm cursor-pointer" id="branch" name="branch">
<option value="">Buxoro (Asosiy)</option>
<option value="tashkent">Toshkent filiali</option>
<option value="samarkand">Samarqand filiali</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-neutral-500">
<span class="material-symbols-outlined text-[20px]" style="">
                                expand_more
                            </span>
</div>
</div>
</div>
</form>
