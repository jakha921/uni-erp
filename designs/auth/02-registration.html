<body class="bg-surface-page min-h-screen flex text-on-surface font-text-base font-text-base">
<!-- Split Screen Layout -->
<div class="flex w-full min-h-screen">
<!-- Left Side: Branding (Hidden on mobile) -->
<div class="hidden lg:flex lg:w-1/2 bg-gradient-to-br from-primary-700 to-primary-900 relative overflow-hidden flex-col justify-center items-center px-12 text-center text-on-primary">
<!-- Decorative Background Elements -->
<div class="absolute top-0 left-0 w-full h-full opacity-10" style="background-image: radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.4) 0%, transparent 50%);"></div>
<div class="absolute bottom-0 right-0 w-full h-full opacity-10" style="background-image: radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.4) 0%, transparent 50%);"></div>
<div class="relative z-10 max-w-md">
<div class="mb-8 flex justify-center">
<div class="w-24 h-24 bg-white/10 backdrop-blur-md rounded-2xl flex items-center justify-center border border-white/20 shadow-lg">
<span class="material-symbols-outlined text-white" style="font-size: 48px; font-variation-settings: 'FILL' 1;">school</span>
</div>
</div>
<h1 class="text-text-4xl font-text-4xl mb-4 tracking-tight text-white">Uni ERP</h1>
<p class="text-text-xl font-text-xl text-primary-100 font-medium">Navoi Innovatsiyalar Universiteti</p>
<div class="mt-16 pt-16 border-t border-white/10">
<p class="text-text-sm font-text-sm text-primary-200">
                        Talabalar va o'qituvchilar uchun yagona boshqaruv tizimi
                    </p>
</div>
</div>
</div>
<!-- Right Side: Registration Form -->
<div class="w-full lg:w-1/2 bg-surface-card flex flex-col justify-center px-6 sm:px-12 lg:px-24 py-12 overflow-y-auto">
<div class="w-full max-w-lg mx-auto">
<!-- Mobile Brand Header (Visible only on mobile) -->
<div class="lg:hidden flex items-center gap-3 mb-10">
<div class="w-10 h-10 bg-primary-600 rounded-lg flex items-center justify-center">
<span class="material-symbols-outlined text-white" style="font-size: 24px; font-variation-settings: 'FILL' 1;">school</span>
</div>
<h1 class="text-text-2xl font-text-2xl tracking-tight text-primary-700">Uni ERP</h1>
</div>
<!-- Page Title -->
<div class="mb-8">
<h2 class="text-text-3xl font-text-3xl text-neutral-900 mb-2">Ro'yxatdan o'tish</h2>
<p class="text-text-base font-text-base text-neutral-500">Tizimdan foydalanish uchun hisob yarating</p>
</div>
<!-- Step Indicator -->
<div class="mb-10">
<div class="flex items-center justify-between relative">
<!-- Connecting Line -->
<div class="absolute top-1/2 left-0 w-full h-[2px] bg-neutral-200 -z-10 -translate-y-1/2 rounded-full"></div>
<div class="absolute top-1/2 left-0 w-1/3 h-[2px] bg-primary-500 -z-10 -translate-y-1/2 rounded-full transition-all duration-300"></div>
<!-- Step 1 (Active) -->
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary-500 text-white flex items-center justify-center text-text-sm font-text-sm font-semibold shadow-md ring-4 ring-white">
                                1
                            </div>
<span class="text-text-xs font-text-xs text-primary-600 font-medium">Shaxsiy ma'lumotlar</span>
</div>
<!-- Step 2 -->
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-card border-2 border-neutral-300 text-neutral-500 flex items-center justify-center text-text-sm font-text-sm font-medium ring-4 ring-white">
                                2
                            </div>
<span class="text-text-xs font-text-xs text-neutral-500">Lavozim</span>
</div>
<!-- Step 3 -->
<div class="flex flex-col items-center gap-2">
<div class="w-8 h-8 rounded-full bg-surface-card border-2 border-neutral-300 text-neutral-500 flex items-center justify-center text-text-sm font-text-sm font-medium ring-4 ring-white">
                                3
                            </div>
<span class="text-text-xs font-text-xs text-neutral-500">Tasdiqlash</span>
</div>
</div>
</div>
<!-- Registration Form Step 1 -->
<form class="flex flex-col gap-form-gap">
<!-- Grid for personal details -->
<div class="grid grid-cols-1 sm:grid-cols-2 gap-form-gap">
<!-- First Name -->
<div class="flex flex-col gap-1.5">
<label class="text-text-sm font-text-sm font-medium text-neutral-700" for="firstName">Ism</label>
<input class="w-full h-10 px-3 rounded border border-neutral-300 bg-surface-card text-neutral-900 placeholder:text-neutral-400 focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/30 transition-all text-text-sm font-text-sm" id="firstName" name="firstName" placeholder="Ismingizni kiriting" type="text"/>
</div>
<!-- Last Name -->
<div class="flex flex-col gap-1.5">
<label class="text-text-sm font-text-sm font-medium text-neutral-700" for="lastName">Familiya</label>
<input class="w-full h-10 px-3 rounded border border-neutral-300 bg-surface-card text-neutral-900 placeholder:text-neutral-400 focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/30 transition-all text-text-sm font-text-sm" id="lastName" name="lastName" placeholder="Familiyangizni kiriting" type="text"/>
</div>
<!-- Phone Number -->
<div class="flex flex-col gap-1.5">
<label class="text-text-sm font-text-sm font-medium text-neutral-700" for="phone">Telefon raqami</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-neutral-400" style="font-size: 20px;">call</span>
<input class="w-full h-10 pl-10 pr-3 rounded border border-neutral-300 bg-surface-card text-neutral-900 placeholder:text-neutral-400 focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/30 transition-all text-text-sm font-text-sm" dir="ltr" id="phone" name="phone" placeholder="+998 (__) ___-__-__" type="tel" value="+998 "/>
</div>
</div>
<!-- Email -->
<div class="flex flex-col gap-1.5">
<label class="text-text-sm font-text-sm font-medium text-neutral-700" for="email">Email</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-neutral-400" style="font-size: 20px;">mail</span>
<input class="w-full h-10 pl-10 pr-3 rounded border border-neutral-300 bg-surface-card text-neutral-900 placeholder:text-neutral-400 focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/30 transition-all text-text-sm font-text-sm" id="email" name="email" placeholder="example@mail.com" type="email"/>
</div>
</div>
<!-- Password -->
<div class="flex flex-col gap-1.5">
<label class="text-text-sm font-text-sm font-medium text-neutral-700" for="password">Parol</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-neutral-400" style="font-size: 20px;">lock</span>
<input class="w-full h-10 pl-10 pr-10 rounded border border-neutral-300 bg-surface-card text-neutral-900 placeholder:text-neutral-400 focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/30 transition-all text-text-sm font-text-sm" id="password" name="password" placeholder="Parolni kiriting" type="password"/>
<button class="absolute right-3 text-neutral-400 hover:text-neutral-600 focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
</button>
</div>
</div>
<!-- Confirm Password -->
<div class="flex flex-col gap-1.5">
<label class="text-text-sm font-text-sm font-medium text-neutral-700" for="confirmPassword">Parolni tasdiqlash</label>
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-neutral-400" style="font-size: 20px;">lock_reset</span>
<input class="w-full h-10 pl-10 pr-10 rounded border border-neutral-300 bg-surface-card text-neutral-900 placeholder:text-neutral-400 focus:outline-none focus:border-primary-500 focus:ring-2 focus:ring-primary-500/30 transition-all text-text-sm font-text-sm" id="confirmPassword" name="confirmPassword" placeholder="Parolni takrorlang" type="password"/>
<button class="absolute right-3 text-neutral-400 hover:text-neutral-600 focus:outline-none" type="button">
<span class="material-symbols-outlined" style="font-size: 20px;">visibility</span>
</button>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex justify-between items-center mt-section-gap pt-6 border-t border-neutral-100">
<button class="px-6 py-2.5 rounded text-text-sm font-text-sm font-medium text-neutral-400 bg-neutral-100 cursor-not-allowed border border-transparent flex items-center gap-2" disabled="" type="button">
<span class="material-symbols-outlined" style="font-size: 18px;">arrow_back</span>
                            Ortga
                        </button>
<button class="px-6 py-2.5 rounded text-text-sm font-text-sm font-medium text-white bg-primary-500 hover:bg-primary-600 active:scale-[0.98] transition-all shadow-sm flex items-center gap-2 border border-transparent" type="button">
                            Keyingi
                            <span class="material-symbols-outlined" style="font-size: 18px;">arrow_forward</span>
</button>
</div>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-text-sm font-text-sm text-neutral-500">
                        Akkauntingiz bormi? 
                        <a class="text-primary-600 font-semibold hover:text-primary-700 hover:underline transition-colors ml-1" href="#">Tizimga kiring</a>
</p>
