name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      COOLIFY_URL: ${{ secrets.COOLIFY_URL }}
      COOLIFY_TOKEN: ${{ secrets.COOLIFY_TOKEN }}
      BACKEND_UUID: ${{ secrets.BACKEND_UUID }}
      FRONTEND_UUID: ${{ secrets.FRONTEND_UUID }}
    steps:
      - name: Deploy Backend
        run: |
          curl -s -X POST "${COOLIFY_URL}/api/v1/applications/${BACKEND_UUID}/deploy" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json"

      - name: Deploy Frontend
        run: |
          curl -s -X POST "${COOLIFY_URL}/api/v1/applications/${FRONTEND_UUID}/deploy" \
            -H "Authorization: Bearer ${COOLIFY_TOKEN}" \
            -H "Content-Type: application/json"

      - name: Verify
        run: echo "Deployments triggered. Check https://erp.niuedu.uz"
