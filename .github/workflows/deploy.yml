name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify redeploy (backend)
        run: |
          curl -s -X GET "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.BACKEND_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"

      - name: Trigger Coolify redeploy (frontend)
        run: |
          curl -s -X GET "${{ secrets.COOLIFY_URL }}/api/v1/deploy?uuid=${{ secrets.FRONTEND_UUID }}&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            -H "Content-Type: application/json"
